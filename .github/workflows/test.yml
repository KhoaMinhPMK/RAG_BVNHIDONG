name: Tests & Quality Checks

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint all packages
        run: yarn lint || echo "Lint not configured yet"

      - name: Type check all packages
        run: yarn typecheck || echo "Typecheck not configured yet"

      - name: Run tests
        run: yarn test || echo "Tests not configured yet"

      - name: Security audit
        run: yarn audit --level moderate || echo "No critical vulnerabilities"

      - name: Check for secrets
        run: |
          echo "Checking for exposed secrets..."
          ! grep -r "SUPABASE_SERVICE_ROLE_KEY" apps/ --include="*.ts" --include="*.js" --include="*.tsx" --include="*.jsx" || exit 1
          ! grep -r "sk-" apps/ --include="*.ts" --include="*.js" --include="*.tsx" --include="*.jsx" || exit 1
          echo "No secrets found in code"
