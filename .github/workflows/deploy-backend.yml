name: Deploy Backend API

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Type check
        run: |
          cd apps/api
          yarn typecheck || echo "Typecheck not configured yet"

      - name: Lint
        run: |
          cd apps/api
          yarn lint || echo "Lint not configured yet"

      - name: Build
        run: |
          cd apps/api
          yarn build || echo "Build not configured yet"

      - name: Run tests
        run: |
          cd apps/api
          yarn test || echo "Tests not configured yet"

